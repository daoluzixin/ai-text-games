<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI文游游戏厅</title>
    <!-- AI 消息渲染统一走 iframe（/static/md-frame.html）的 XML 结构化渲染，主页面无需 Markdown 依赖 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root, [data-theme="lavender"] {
            /* 🌸 梦幻薰衣草 · 少女甜美配色 */
            --primary: #b794f6;
            --primary-light: #d6bcfa;
            --primary-deep: #9f7aea;
            --pink: #f9a8d4;
            --pink-soft: #fbcfe8;
            --bg: #fbf6ff;
            --bg-card: #ffffff;
            --bg-soft: #f6edff;
            --text: #6b5b73;
            --text-muted: #b3a4bf;
            --accent: #f472b6;
            --user-bubble: linear-gradient(135deg, #d6bcfa, #f9a8d4);
            --ai-bubble: #fdf2ff;
            --border: rgba(183, 148, 246, 0.22);
            --shadow-soft: 0 8px 24px rgba(183, 148, 246, 0.18);
            --radius: 24px;
            --font-cute: "Comic Sans MS", "Yuanti SC", "圆体-简", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
            --body-bg: radial-gradient(circle at 15% 20%, #fbe4f5 0%, transparent 45%),
                        radial-gradient(circle at 85% 15%, #e6dbff 0%, transparent 45%),
                        radial-gradient(circle at 50% 100%, #ffeaf6 0%, transparent 55%),
                        linear-gradient(160deg, #fbf6ff 0%, #fdeffb 100%);
            --floaties: '💕,🌸,✨,💗,🦋,🌷,⭐,🩷,🐰,🌺';
            --header-gradient: linear-gradient(120deg, #b794f6 0%, #f472b6 55%, #f9a8d4 100%);
            --scrollbar-thumb: var(--pink-soft);
            --scrollbar-hover: var(--pink);
        }

        [data-theme="gothic"] {
            /* 🦇 哥特暗夜 · 暗黑血色 */
            --primary: #8b5cf6;
            --primary-light: #6d28d9;
            --primary-deep: #a78bfa;
            --pink: #dc2626;
            --pink-soft: #7f1d1d;
            --bg: #0f0a1a;
            --bg-card: #1a1025;
            --bg-soft: #1f1530;
            --text: #e8dff0;
            --text-muted: #9b8ab0;
            --accent: #ef4444;
            --user-bubble: linear-gradient(135deg, #6d28d9, #dc2626);
            --ai-bubble: #1a1025;
            --border: rgba(139, 92, 246, 0.3);
            --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.5);
            --radius: 24px;
            --font-cute: "Cinzel", "Noto Serif SC", "Source Han Serif CN", "PingFang SC", serif;
            --body-bg: radial-gradient(circle at 20% 30%, #1a0520 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, #0d001a 0%, transparent 50%),
                        radial-gradient(circle at 50% 90%, #1a0010 0%, transparent 50%),
                        linear-gradient(160deg, #0a0510 0%, #0f0a1a 100%);
            --floaties: '🦇,🌑,💀,🕷️,🥀,⚰️,🔮,🕯️,🖤,☠️';
            --header-gradient: linear-gradient(120deg, #8b5cf6 0%, #dc2626 55%, #a78bfa 100%);
            --scrollbar-thumb: #6d28d9;
            --scrollbar-hover: #8b5cf6;
        }

        [data-theme="cyber"] {
            /* 🌃 赛博霓虹 · 朋克未来 */
            --primary: #06b6d4;
            --primary-light: #22d3ee;
            --primary-deep: #0891b2;
            --pink: #f0abfc;
            --pink-soft: #701a75;
            --bg: #0a0e1a;
            --bg-card: #111827;
            --bg-soft: #1e1b3a;
            --text: #e0f2fe;
            --text-muted: #7dd3fc;
            --accent: #f472b6;
            --user-bubble: linear-gradient(135deg, #06b6d4, #f0abfc);
            --ai-bubble: #111827;
            --border: rgba(6, 182, 212, 0.3);
            --shadow-soft: 0 8px 24px rgba(6, 182, 212, 0.2);
            --radius: 24px;
            --font-cute: "Orbitron", "SF Mono", "Fira Code", "PingFang SC", monospace;
            --body-bg: radial-gradient(circle at 10% 80%, #0c1a3a 0%, transparent 50%),
                        radial-gradient(circle at 90% 10%, #1a0530 0%, transparent 50%),
                        radial-gradient(circle at 50% 50%, #0a1628 0%, transparent 60%),
                        linear-gradient(160deg, #0a0e1a 0%, #0f0520 100%);
            --floaties: '💎,⚡,🔷,💠,🌐,⬡,✦,◈,▲,◆';
            --header-gradient: linear-gradient(120deg, #06b6d4 0%, #f0abfc 55%, #22d3ee 100%);
            --scrollbar-thumb: #0891b2;
            --scrollbar-hover: #06b6d4;
        }

        [data-theme="forest"] {
            /* 🌿 森林精灵 · 自然治愈 */
            --primary: #10b981;
            --primary-light: #6ee7b7;
            --primary-deep: #059669;
            --pink: #fbbf24;
            --pink-soft: #d9f99d;
            --bg: #f0fdf4;
            --bg-card: #ffffff;
            --bg-soft: #ecfdf5;
            --text: #1f4a3a;
            --text-muted: #6b9080;
            --accent: #f59e0b;
            --user-bubble: linear-gradient(135deg, #6ee7b7, #a7f3d0);
            --ai-bubble: #f0fdf4;
            --border: rgba(16, 185, 129, 0.22);
            --shadow-soft: 0 8px 24px rgba(16, 185, 129, 0.15);
            --radius: 24px;
            --font-cute: "Yuanti SC", "圆体-简", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", -apple-system, sans-serif;
            --body-bg: radial-gradient(circle at 20% 30%, #d1fae5 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, #fef9c3 0%, transparent 40%),
                        radial-gradient(circle at 50% 90%, #ecfdf5 0%, transparent 50%),
                        linear-gradient(160deg, #f0fdf4 0%, #fefce8 100%);
            --floaties: '🌿,🍃,🌱,🦋,🌻,🍀,🌾,🐝,🌳,🍂';
            --header-gradient: linear-gradient(120deg, #10b981 0%, #f59e0b 55%, #6ee7b7 100%);
            --scrollbar-thumb: #6ee7b7;
            --scrollbar-hover: #10b981;
        }

        body {
            font-family: var(--font-cute);
            background: var(--body-bg);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.4s, color 0.3s;
        }

        /* 🎈 背景飘落的小爱心 / 花瓣 */
        .floaties {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }
        .floaties span {
            position: absolute;
            top: -40px;
            font-size: 20px;
            opacity: 0.55;
            animation: floatDown linear infinite;
            will-change: transform;
        }
        @keyframes floatDown {
            0%   { transform: translateY(-40px) rotate(0deg); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
        .page, .upload-modal, .choice-modal, .upload-fab { position: relative; z-index: 1; }

        /* ========== 游戏列表页 ========== */
        .page { display: none; height: 100vh; }
        .page.active { display: flex; flex-direction: column; }

        #games-page {
            background: transparent;
        }

        .games-header {
            padding: 44px 20px 16px;
            text-align: center;
        }

        .games-header h1 {
            font-size: 30px;
            font-weight: 800;
            background: var(--header-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .games-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .games-grid {
            flex: 1;
            overflow-y: auto;
            padding: 28px 32px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 28px;
            align-content: start;
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
        }

        .game-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 26px;
            padding: 36px 20px 28px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 18px rgba(183, 148, 246, 0.12);
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--primary-light), var(--pink));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .game-card:hover {
            transform: translateY(-6px) rotate(-1deg);
            border-color: var(--pink);
            box-shadow: 0 14px 34px rgba(244, 114, 182, 0.25);
        }

        .game-card:hover::before {
            opacity: 1;
        }

        .game-card:active {
            transform: translateY(-2px) scale(0.98);
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: block;
        }

        .game-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 16px;
            border: 3px solid var(--pink-soft);
            background: var(--bg-soft);
            box-shadow: 0 4px 12px rgba(244, 114, 182, 0.2);
        }

        .game-name {
            font-size: 15px;
            font-weight: 700;
            line-height: 1.4;
            word-break: break-word;
            color: var(--text);
        }

        .game-summary {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 游戏卡上的「有存档」角标 */
        .game-save-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 14px;
            font-size: 11px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, var(--pink), var(--accent));
            box-shadow: 0 3px 8px rgba(244, 114, 182, 0.35);
        }

        .games-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .games-empty .empty-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        /* ========== 进入游戏选择弹窗 ========== */
        .choice-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(183, 148, 246, 0.28);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .choice-modal.show { display: flex; }

        .choice-box {
            background: var(--bg-card);
            border: 2px solid var(--pink-soft);
            border-radius: 28px;
            padding: 28px 24px 24px;
            max-width: 420px;
            width: 100%;
            animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
            box-shadow: 0 18px 50px rgba(183, 148, 246, 0.35);
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.85) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .choice-head {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .choice-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            background: var(--bg-soft);
            border: 3px solid var(--pink-soft);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .choice-head-text { min-width: 0; }

        .choice-title {
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .choice-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .choice-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .choice-option {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-soft);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .choice-option:hover {
            border-color: var(--pink);
            background: #fdeef8;
            transform: translateX(2px);
        }

        .choice-option .opt-icon {
            font-size: 26px;
            flex-shrink: 0;
        }

        .choice-option .opt-body { flex: 1; min-width: 0; }

        .choice-option .opt-name {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 3px;
        }

        .choice-option .opt-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .choice-option.continue { border-color: var(--primary-light); background: #f6edff; }

        .choice-meta {
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.8;
            margin-top: 4px;
            display: flex;
            gap: 12px;
        }

        .choice-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }

        .choice-cancel {
            padding: 8px 18px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .choice-cancel:hover { border-color: var(--text); color: var(--text); }

        .choice-delete {
            padding: 8px 16px;
            border: 1px solid transparent;
            background: transparent;
            color: var(--text-muted);
            border-radius: 18px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

.choice-delete:hover {
    border-color: var(--accent);
    color: var(--accent);
}

/* 多存档：存档列表区域 */
.saves-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 46vh;
    overflow-y: auto;
    margin-bottom: 4px;
}

/* 单条存档：整体可点继续，右侧删除按钮独立 */
.save-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #f6edff;
    border: 2px solid var(--primary-light);
    border-radius: 20px;
    padding: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

.save-item:hover {
    border-color: var(--pink);
    background: #fdeef8;
    transform: translateX(2px);
}

.save-item .opt-icon { font-size: 24px; flex-shrink: 0; }
.save-item .opt-body { flex: 1; min-width: 0; }
.save-item .opt-name { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
.save-item .opt-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

/* 单条存档上的删除按钮 */
.save-del {
    flex-shrink: 0;
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 16px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.2s;
}

.save-del:hover { background: #ffe3ef; color: var(--accent); }

/* 新建存档按钮（达上限时禁用） */
.save-new-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    border: 2px dashed var(--primary-light);
    background: transparent;
    color: var(--primary-deep);
    border-radius: 20px;
    padding: 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    transition: all 0.2s;
}

.save-new-btn:hover:not(:disabled) {
    border-color: var(--pink);
    background: #fdeef8;
    color: var(--accent);
}

.save-new-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    border-style: solid;
}

.saves-empty-tip {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    padding: 6px 0 2px;
}

/* ========== 聊天页 ========== */
        #chat-page {
            background: transparent;
            position: relative;
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: color-mix(in srgb, var(--bg-card) 85%, transparent);
            backdrop-filter: blur(8px);
            border-bottom: 2px solid var(--border);
            gap: 12px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .chat-header-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-back {
            width: 38px;
            height: 38px;
            border: none;
            background: var(--bg-soft);
            border-radius: 50%;
            color: var(--primary-deep);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .chat-back:hover {
            background: var(--pink-soft);
            transform: scale(1.08);
        }

        .chat-title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-reset {
            padding: 6px 12px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chat-reset:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            animation: fadeIn 0.3s ease;
        }

        .message-row.user {
            flex-direction: row-reverse;
        }

        .message-row.system-msg {
            justify-content: center;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg-avatar.user-avatar {
            background: var(--user-bubble);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            box-shadow: 0 3px 8px rgba(244, 114, 182, 0.3);
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            box-shadow: 0 4px 12px rgba(183, 148, 246, 0.14);
        }
        .message.assistant {
            white-space: normal;
            max-width: 96%;
            width: 96%;
            padding: 18px 24px;
            border-radius: 18px;
            border-bottom-left-radius: 6px;
            background: var(--ai-bubble);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }
        .message.assistant iframe {
            width: 100%;
            border: none;
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: var(--user-bubble);
            color: #fff;
            border-bottom-right-radius: 6px;
        }

        .message.system-msg {
            background: transparent;
            color: var(--text-muted);
            font-size: 13px;
            padding: 8px;
            max-width: 100%;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 12px 16px;
            background: var(--ai-bubble);
            border: 1.5px solid var(--border);
            border-radius: 22px;
            border-bottom-left-radius: 6px;
            display: none;
        }

        .typing-indicator.show { display: block; }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--pink);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .chat-input-area {
            display: flex;
            gap: 10px;
            padding: 12px 16px;
            background: color-mix(in srgb, var(--bg-card) 85%, transparent);
            backdrop-filter: blur(8px);
            border-top: 2px solid var(--border);
        }

        .chat-input {
            flex: 1;
            padding: 12px 18px;
            border: 2px solid var(--border);
            background: var(--bg-soft);
            border-radius: 24px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
            font-family: var(--font-cute);
        }

        .chat-input:focus {
            border-color: var(--pink);
            background: #fff;

        /* ========== 回到底部浮动按钮 ========== */
        .scroll-bottom-btn {

            border: 2px solid var(--pink-soft);

            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;

            z-index: 20;

            animation: fadeIn 0.2s ease;
        }
        .scroll-bottom-btn.show { display: flex; }
        .scroll-bottom-btn:hover {
            transform: scale(1.1);
            border-color: var(--pink);
            box-shadow: 0 6px 18px rgba(244, 114, 182, 0.4);
        }
        .scroll-bottom-btn .new-msg-dot {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 10px;
            height: 10px;
            background: var(--accent);

        /* ========== 快捷操作 ========== */
        .quick-actions {
            display: flex;
            gap: 8px;
            padding: 10px 16px;
            overflow-x: auto;

        .quick-btn {
            padding: 7px 16px;
            border: 2px solid var(--border);
            background: var(--bg-card);
            color: var(--primary-deep);
            border-radius: 18px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            font-family: var(--font-cute);
        }

        .quick-btn:hover {
            border-color: var(--pink);
            background: var(--pink-soft);
            color: var(--accent);
            transform: translateY(-2px);
        }

        /* ========== 自定义确认弹窗 ========== */
        .confirm-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(183, 148, 246, 0.28);
            backdrop-filter: blur(4px);
            z-index: 300;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-modal.show { display: flex; }
        .confirm-box {
            background: var(--bg-card);
            border: 2px solid var(--pink-soft);
            border-radius: 24px;
            padding: 28px 24px 22px;
            max-width: 340px;
            width: 100%;
            text-align: center;
            box-shadow: 0 18px 50px rgba(183, 148, 246, 0.35);
            animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
        }
        .confirm-box .confirm-icon {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .confirm-box .confirm-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }
        .confirm-box .confirm-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 22px;
            line-height: 1.6;
        }
        .confirm-box .confirm-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .confirm-box .confirm-btn {
            padding: 10px 24px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-cute);
            border: none;
        }
        .confirm-box .confirm-btn.cancel {
            background: var(--bg-soft);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
        .confirm-box .confirm-btn.cancel:hover {
            border-color: var(--text);
            color: var(--text);
        }
        .confirm-box .confirm-btn.danger {
            background: linear-gradient(135deg, var(--pink), var(--accent));
            color: #fff;
            box-shadow: 0 4px 12px rgba(244, 114, 182, 0.35);
        }
        .confirm-box .confirm-btn.danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(244, 114, 182, 0.5);
        }

        /* ========== 加载态 ========== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
            grid-column: 1 / -1;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--pink-soft);
            border-top-color: var(--pink);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 480px) {
            .games-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
                padding: 16px 16px 32px;
            }
            .game-card { padding: 26px 12px 20px; }
            .game-avatar { width: 64px; height: 64px; }
            .games-header { padding: 30px 16px 16px; }
            .games-header h1 { font-size: 24px; }
        }

        /* ========== 上传相关 ========== */
        .upload-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-light), var(--pink), var(--accent));
            border: 3px solid #fff;
            color: white;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 6px 22px rgba(244, 114, 182, 0.5);
            transition: all 0.3s cubic-bezier(.34,1.56,.64,1);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .upload-fab:hover {
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 8px 30px rgba(244, 114, 182, 0.7);
        }

        .upload-fab:active {
            transform: scale(0.95);
        }

        .upload-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(183, 148, 246, 0.28);
            backdrop-filter: blur(4px);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-modal.show {
            display: flex;
        }

        .upload-box {
            background: var(--bg-card);
            border: 2px solid var(--pink-soft);

            padding: 32px;

            text-align: center;
            box-shadow: 0 18px 50px rgba(183, 148, 246, 0.35);
            animation: popIn 0.3s cubic-bezier(.34,1.56,.64,1);
        }

        .upload-box h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }

        .upload-box p {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .upload-dropzone {
            border: 2.5px dashed var(--primary-light);
            border-radius: 20px;
            padding: 40px 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
            background: var(--bg-soft);
        }

        .upload-dropzone:hover,
        .upload-dropzone.dragover {
            border-color: var(--pink);
            background: #fdeef8;
        }

        .upload-dropzone .drop-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .upload-dropzone .drop-text {
            color: var(--text-muted);
            font-size: 14px;
        }

        .upload-dropzone .drop-text em {
            color: var(--primary-light);
            font-style: normal;
            text-decoration: underline;
        }

        .upload-progress {
            display: none;
            margin-top: 16px;
        }

            display: block;

            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

            font-size: 13px;

        /* ========== 主题切换面板 ========== */

            position: fixed;
            top: 16px;
            right: 16px;

            height: 42px;
            border-radius: 50%;
            background: var(--bg-card);

            cursor: pointer;

            transition: all 0.3s;

        .theme-toggle-btn:hover {
            transform: rotate(30deg) scale(1.1);
            border-color: var(--pink);
        }
        /* 首次提示脉冲动画 */
        .theme-toggle-btn.hint-pulse {
            animation: themePulse 2s ease-in-out infinite;
            border-color: var(--pink);
            box-shadow: 0 0 0 0 rgba(249, 168, 212, 0.5);
        }
        @keyframes themePulse {
            0%   { box-shadow: 0 0 0 0 rgba(249, 168, 212, 0.5); }
            70%  { box-shadow: 0 0 0 12px rgba(249, 168, 212, 0); }
            100% { box-shadow: 0 0 0 0 rgba(249, 168, 212, 0); }
        }
        /* 提示气泡 */
        .theme-hint-tooltip {
            position: fixed;
            top: 62px;
            right: 16px;
            background: var(--primary-deep);
            color: #fff;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            white-space: nowrap;
            z-index: 160;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .theme-hint-tooltip.show {
            opacity: 1;
            transform: translateY(0);
        }
        .theme-hint-tooltip::before {
            content: '';
            position: absolute;
            top: -6px;
            right: 16px;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 6px solid var(--primary-deep);
        }

        .sound-panel {
            display: none;
            position: fixed;
            top: 118px;
            right: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 0 6px;

            z-index: 200;
            min-width: 180px;

        .theme-panel {
            display: none;
            position: fixed;
            top: 68px;
            right: 16px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            z-index: 150;
            box-shadow: var(--shadow-soft);

        }
        .theme-panel.show { display: block; }

        .theme-panel-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);

        .theme-options {

        .theme-option {
            display: flex;

        }

            border-color: var(--pink);
            transform: translateY(-2px);
        }
        .theme-option.active {
            border-color: var(--primary);
            background: var(--bg-card);

        }

            font-size: 11px;
            font-weight: 600;
            color: var(--text);
            text-align: center;
            line-height: 1.3;
        }
    </style>
</head>

<script>
    // ============================================================
    // 状态
    // ============================================================
    let currentGameId = null;
    let currentGameName = '';
    // 当前这局正在用的 session_id。注意：不再用单一全局槽，
    // 而是按 game_id 隔离记忆每个剧本的「最后一次存档」，避免切换剧本时互相覆盖。
    let sessionId = null;

    // 读取「每个剧本 -> 最后使用的存档 id」映射
    function loadLastSessionMap() {
        try {
            return JSON.parse(localStorage.getItem('last_session_by_game') || '{}');
        } catch (e) {
            return {};
        }
    }
    // 记住某个剧本最后一次进入的存档 id（按 game_id 隔离，互不覆盖）
    function rememberLastSession(gameId, sid) {
        if (!gameId || !sid) return;
        const map = loadLastSessionMap();
        map[gameId] = sid;
        localStorage.setItem('last_session_by_game', JSON.stringify(map));
    }
    // 取某个剧本最后一次使用的存档 id（没有则返回 null）
    function getLastSession(gameId) {
        return loadLastSessionMap()[gameId] || null;
    }

    let isStreaming = false;

    // 存档索引：game_id -> 该游戏的存档数组（按时间倒序，用于角标和选择弹窗）
    let savesByGameId = {};

    // 每个游戏最多保留的存档数
    const MAX_SAVES_PER_GAME = 3;

    // 选择弹窗当前指向的游戏（点游戏卡时临时记录）
    let pendingGame = null;

    // 游戏图标池（无头像时的回退方案）
    const icons = ['🏰', '👑', '⚔️', '🌸', '🎭', '💫', '🔮', '🌙', '🦋', '🎪', 
                   '🗡️', '💎', '🌺', '🎲', '🏯', '👸', '🐉', '🌊', '🔥', '❄️',
                   '🎵', '🌹', '🦊', '🐺', '🌿', '⭐', '🎀', '🏹', '📜', '🗝️'];

    // 当前游戏的头像 URL
    let currentAvatarUrl = null;
    // 当前存档锁定的头像（发消息时携带给后端持久化）
    let currentSessionAvatar = null;

    function generateId() {
        return 'xxxx-xxxx-xxxx'.replace(/x/g, () => 
            Math.floor(Math.random() * 16).toString(16));
    }

    // ============================================================
    // 游戏列表
    // ============================================================
    // 同时拉取游戏列表和存档，存档按 game_id 建索引后再渲染卡片
    async function loadGames() {
        const grid = document.getElementById('games-grid');
        try {
            const [gamesRes, savesRes] = await Promise.all([
                fetch('/api/games'),
                fetch('/api/sessions').catch(() => null),
            ]);
            const games = await gamesRes.json();

            // 构建存档索引：同一游戏的所有存档归到一个数组（后端已按时间倒序）
            savesByGameId = {};
            if (savesRes && savesRes.ok) {
                const saves = await savesRes.json();
                for (const s of saves) {
                    if (!s.game_exists) continue;
                    (savesByGameId[s.game_id] ||= []).push(s);
                }
            }

            renderGames(games);
        } catch (e) {
            grid.innerHTML = `
                <div class="games-empty">
                    <div class="empty-icon">😵</div>
                    <p>加载失败，请检查服务是否运行</p>
                </div>`;
        }
    }

    function renderGames(games) {
        const grid = document.getElementById('games-grid');
        if (games.length === 0) {
            grid.innerHTML = `
                <div class="games-empty">
                    <div class="empty-icon">📂</div>
                    <p>还没有游戏哦~<br>往 games/ 目录丢 .docx 文件就能添加新游戏</p>
                </div>`;
            return;
        }

        grid.innerHTML = games.map((game, i) => {
            const avatarHtml = game.avatar
                ? `<img class="game-avatar" src="${game.avatar}" alt="${escapeHtml(game.name)}">`
                : `<span class="game-icon">${icons[i % icons.length]}</span>`;
            // 有存档的游戏右上角加角标，显示存档数量
            const saveCount = (savesByGameId[game.id] || []).length;
            const badge = saveCount > 0
                ? `<span class="game-save-badge">📖 ${saveCount} 个存档</span>`
                : '';
            const summaryHtml = game.summary
                ? `<div class="game-summary">${escapeHtml(game.summary)}</div>`
                : '';
            return `
                <div class="game-card"
                     data-game-id="${escapeHtml(game.id)}"
                     data-game-name="${escapeHtml(game.name)}"
                     data-avatar="${game.avatar || ''}"
                     onclick="onGameCardClick(this)">
                    ${badge}
                    ${avatarHtml}
                    <div class="game-name">${escapeHtml(game.name)}</div>
                    ${summaryHtml}
                </div>
            `;
        }).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // 流式打字阶段：剥离 XML 标签，提取纯文本内容做轻量预渲染
    // 让玩家看到的是干净的叙事文字，而非 <scene><narration>... 原始标签
    function stripXmlForPreview(raw) {
        if (!raw) return '';
        let text = raw;
        // 去掉 ```xml 包裹
        if (text.trimStart().startsWith('```')) {
            text = text.replace(/^```[^\n]*\n?/, '').replace(/\n?```\s*$/, '');
        }
        // 去掉所有 XML 标签，保留标签内的文本
        text = text.replace(/<[^>]+>/g, '');
        // 解码常见 XML 实体
        text = text.replace(/&lt;/g, '<').replace(/&gt;/g, '>')
                   .replace(/&amp;/g, '&').replace(/&quot;/g, '"').replace(/&#39;/g, "'");
        // 合并多余空行（标签去掉后会留下很多空行）
        text = text.replace(/\n{3,}/g, '\n\n').trim();
        // 转义回 HTML 安全并保留换行
        return escapeHtml(text).replace(/\n/g, '<br>');
    }

    // ============================================================
    // 历史存档
    // ============================================================
    // 把后端的 UTC 时间戳转成本地时间，固定格式：YYYY-MM-DD HH:MM
    function formatTime(utcStr) {
        if (!utcStr) return '';
        // SQLite CURRENT_TIMESTAMP 是 "YYYY-MM-DD HH:MM:SS" 的 UTC 时间
        // 转成 ISO 格式并标记为 UTC，让浏览器按本地时区显示
        const iso = utcStr.replace(' ', 'T') + 'Z';
        const d = new Date(iso);
        if (isNaN(d.getTime())) return utcStr;

        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    // ============================================================
    // 进入游戏选择弹窗（新游戏 / 继续存档）
    // ============================================================
    function openChoiceModal(game) {
        pendingGame = game;

        // 头部：头像 + 游戏名
        const avatarEl = document.getElementById('choice-avatar');
        if (game.avatar) {
            avatarEl.innerHTML = `<img src="${game.avatar}" alt=""
                style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;
        } else {
            avatarEl.textContent = '🎮';
        }
        document.getElementById('choice-title').textContent = game.name;

        renderSavesList(game);
        document.getElementById('choice-modal').classList.add('show');
    }

    // 渲染弹窗里的存档列表 + 新建按钮的可用状态
    function renderSavesList(game) {
        const saves = savesByGameId[game.id] || [];
        const listEl = document.getElementById('saves-list');

        listEl.innerHTML = saves.map((s, i) => {
            const time = s.last_played ? '⏱ ' + formatTime(s.last_played) : '';
            const count = (s.message_count != null) ? '💬 ' + s.message_count + ' 条' : '';
            const preview = escapeHtml(s.preview || '（暂无对话）');
            const meta = [time, count].filter(Boolean).join('　');
            return `
                <div class="save-item" onclick="continueSave('${escapeHtml(s.session_id)}')">
                    <span class="opt-icon">📖</span>
                    <div class="opt-body">
                        <div class="opt-name">存档 ${i + 1}</div>
                        <div class="opt-desc">${preview}</div>
                        <div class="choice-meta">${escapeHtml(meta)}</div>
                    </div>
                    <button class="save-del"
                            onclick="event.stopPropagation();deleteSave('${escapeHtml(s.session_id)}')"
                            title="删除这个存档">🗑</button>
                </div>`;
        }).join('');

        // 副标题随有无存档变化
        document.getElementById('choice-subtitle').textContent =
            saves.length ? '选一个存档继续，或新建一段冒险~' : '这个游戏还没有存档，新建一个开始吧~';

        // 新建按钮：达上限时禁用并提示
        const atLimit = saves.length >= MAX_SAVES_PER_GAME;
        const newBtn = document.getElementById('save-new-btn');
        newBtn.disabled = atLimit;
        document.getElementById('saves-limit-tip').style.display = atLimit ? 'block' : 'none';
    }

    function closeChoice() {
        document.getElementById('choice-modal').classList.remove('show');
        pendingGame = null;
    }

    // 点某条存档：继续该存档（用该存档锁定的头像）
    function continueSave(sid) {
        const game = pendingGame;
        const save = (savesByGameId[game.id] || []).find(s => s.session_id === sid);
        const avatar = (save && save.avatar) || game.avatar || null;
        closeChoice();
        if (game) enterGame(game.id, game.name, avatar, 'continue', sid);
    }

    // 新建存档：随机选一张头像，生成一个新槽进入全新对话（不覆盖旧档）
    async function confirmNewGame() {
        const game = pendingGame;
        if (!game) return;
        const saves = savesByGameId[game.id] || [];
        if (saves.length >= MAX_SAVES_PER_GAME) {
            alert(`每个游戏最多 ${MAX_SAVES_PER_GAME} 个存档，先删一个再新建吧~`);
            return;
        }
        // 为这个新存档随机抽一张头像（拿不到就回退到游戏默认头像）
        let avatar = game.avatar || null;
        try {
            const res = await fetch('/api/random-avatar');
            const data = await res.json();
            if (data && data.avatar) avatar = data.avatar;
        } catch (e) { /* 随机失败就用默认头像 */ }
        closeChoice();
        const newSid = newSaveSessionId(game.id);
        enterGame(game.id, game.name, avatar, 'new', newSid);
    }

    // 删除指定存档
    async function deleteSave(sid) {
        const game = pendingGame;
        if (!game) return;
        const ok = await showConfirm({
            icon: '🗑️',
            title: '删除存档',
            desc: '删除后这局的对话记录就找不回来了哦~\n确定要删除吗？',
            okText: '删除',
        });
        if (!ok) return;

        try {
            await fetch('/api/sessions/' + encodeURIComponent(sid), { method: 'DELETE' });
        } catch (e) {
            alert('删除失败，请稍后再试');
            return;
        }
        // 从本地索引移除该条，重渲染弹窗；没存档了就关掉弹窗
        const arr = (savesByGameId[game.id] || []).filter(s => s.session_id !== sid);
        if (arr.length) savesByGameId[game.id] = arr;
        else delete savesByGameId[game.id];

        if (savesByGameId[game.id]) {
            renderSavesList(game);
        } else {
            closeChoice();
        }
        loadGames(); // 刷新首页角标
    }

    // 点弹窗背景关闭
    document.getElementById('choice-modal').addEventListener('click', (e) => {
        if (e.target.id === 'choice-modal') closeChoice();
    });

    // ============================================================
    // 进入游戏
    // ============================================================
    // 为一个游戏生成一个新的存档槽（带时间戳，支持同游戏多档）
    function newSaveSessionId(gameId) {
        return 'save-' + gameId + '-' + Date.now();
    }

    // 点游戏卡：始终弹选择窗（列出已有存档 + 新建入口）
    function onGameCardClick(card) {
        playClick();
        const game = {
            id: card.dataset.gameId,
            name: card.dataset.gameName,
            avatar: card.dataset.avatar || null,
        };
        openChoiceModal(game);
    }

    // 真正进入游戏。mode: 'continue' 读取已有存档 / 'new' 全新开始；sid 为具体存档槽
    function enterGame(gameId, gameName, avatarUrl, mode, sid) {
        currentGameId = gameId;
        currentGameName = gameName;
        currentAvatarUrl = avatarUrl;
        currentSessionAvatar = avatarUrl;  // 本局头像，发消息时随身携带让后端持久化

        document.getElementById('chat-title').textContent = gameName;

        // 设置聊天页头部头像
        const headerAvatar = document.getElementById('chat-header-avatar');
        if (avatarUrl) {
            headerAvatar.src = avatarUrl;
            headerAvatar.style.display = 'block';
        } else {
            headerAvatar.style.display = 'none';
        }

        // 使用本次进入的存档槽，并按 game_id 隔离记住它
        // （这样切换到别的剧本再切回来时，本剧本的进度不会被覆盖丢失）
        sessionId = sid || newSaveSessionId(gameId);
        rememberLastSession(gameId, sessionId);

        // 持久化当前游戏状态，刷新页面后可恢复
        sessionStorage.setItem('active-game', JSON.stringify({
            gameId, gameName, avatarUrl, sessionId, mode
        }));

        // 切换页面
        document.getElementById('games-page').classList.remove('active');
        document.getElementById('chat-page').classList.add('active');

        if (mode === 'continue') {
            // 继续上次：回填历史
            loadSessionHistory(sessionId);
        } else {
            // 全新开始：直接显示初始提示，不读旧档
            document.getElementById('chat-messages').innerHTML =
                '<div class="message-row system-msg"><div class="message system-msg">点击下方「开始游戏」或直接输入内容开始~</div></div>';
        }
    }

    // 加载并回填某个存档的历史消息
    async function loadSessionHistory(sid) {
        const container = document.getElementById('chat-messages');
        const initialHint =
            '<div class="message-row system-msg"><div class="message system-msg">点击下方「开始游戏」或直接输入内容开始~</div></div>';

        container.innerHTML =
            '<div class="message-row system-msg"><div class="message system-msg">读取存档中...</div></div>';

        try {
            const res = await fetch('/api/sessions/' + encodeURIComponent(sid));
            const data = await res.json();
            const messages = (data && data.messages) || [];

            container.innerHTML = '';
            if (messages.length === 0) {
                container.innerHTML = initialHint;
                return;
            }

            // ---- 渐进式渲染：先快速显示纯文本，再异步升级为 iframe 富文本 ----
            const frag = document.createDocumentFragment();
            const assistantSlots = []; // 需要后续升级为 iframe 的气泡

            for (const m of messages) {
                if (m.role !== 'user' && m.role !== 'assistant') continue;
                const row = document.createElement('div');
                row.className = `message-row ${m.role}`;
                const bubble = document.createElement('div');
                bubble.className = `message ${m.role}`;

                if (m.role === 'user') {
                    bubble.textContent = m.content;
                } else {
                    // assistant: 先用纯文本快速展示
                    bubble.textContent = stripXmlForPreview(m.content);
                    bubble.style.opacity = '0.85';
                    assistantSlots.push({ bubble, content: m.content, row });
                }
                row.appendChild(bubble);
                frag.appendChild(row);
            }

            // 顶部提示
            const tip = document.createElement('div');
            tip.className = 'message-row system-msg';
            tip.innerHTML =
                '<div class="message system-msg">📖 已读取上次的存档，继续你的冒险吧~</div>';
            frag.insertBefore(tip, frag.firstChild);

            container.appendChild(frag);
            scrollToBottom();

            // 异步逐个升级 assistant 气泡为 iframe（每次间隔一帧，避免卡顿）
            for (let i = 0; i < assistantSlots.length; i++) {
                await new Promise(r => requestAnimationFrame(r));
                const { bubble, content, row } = assistantSlots[i];
                if (!document.body.contains(row)) continue; // 用户已切走
                const newBubble = document.createElement('div');
                newBubble.className = 'message assistant';
                const iframe = document.createElement('iframe');
                iframe.src = '/static/md-frame.html';
                iframe.style.cssText = 'width:100%;border:none;overflow:hidden;display:block;min-height:40px;';
                iframe.scrolling = 'no';
                iframe._pendingText = content;
                iframe._ready = false;
                const onMsg = function(e) {
                    if (!e.data || !e.data.type || e.source !== iframe.contentWindow) return;
                    if (e.data.type === 'md-frame-ready') {
                        iframe._ready = true;
                        iframe.contentWindow.postMessage({ type: 'theme-change', theme: currentTheme }, '*');
                        iframe.contentWindow.postMessage({ type: 'md-update', text: iframe._pendingText }, '*');
                    } else if (e.data.type === 'md-frame-height') {
                        iframe.style.height = e.data.height + 'px';
                    } else if (e.data.type === 'md-choice') {
                        const cid = (e.data.id || '').trim();
                        const ctext = (e.data.text || '').trim();
                        const payload = ctext ? (cid ? cid + '. ' + ctext : ctext) : cid;
                        if (payload) sendQuick(payload);
                    }
                };
                window.addEventListener('message', onMsg);
                newBubble.appendChild(iframe);
                row.replaceChild(newBubble, bubble);
            }
            scrollToBottom();
        } catch (e) {
            container.innerHTML = initialHint;
        }
    }

    function goBack() {
        document.getElementById('chat-page').classList.remove('active');
        document.getElementById('games-page').classList.add('active');
        currentGameId = null;
        sessionStorage.removeItem('active-game'); // 清除刷新恢复状态
        // 返回时刷新游戏列表（会一并刷新存档角标和最后退出时间）
        loadGames();
    }

    // ============================================================
    // 聊天
    // ============================================================
    async function sendMessage() {
        if (isStreaming) return;

        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        input.value = '';
        addMessage('user', text);
        playClick(); // 发送音效

        isStreaming = true;
        document.getElementById('send-btn').disabled = true;
        document.getElementById('typing').classList.add('show');

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    session_id: sessionId,
                    game_id: currentGameId,
                    message: text,
                    avatar: currentSessionAvatar,
                }),
            });

            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || '请求失败');
            }

            // 流式读取：打字机效果，逐步显示纯文本，结束后渲染
            startTypingSound(); // 开始键盘音
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let aiMessage = '';
            let messageEl = null;
            // 渲染格式由 md-frame 自主判断（<scene 开头走 XML，否则纯文本兜底），
            // 后端的 [FORMAT:*] 信号已不参与渲染，仅需消费掉避免混入正文。

            document.getElementById('typing').classList.remove('show');

            let sseBuffer = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                sseBuffer += decoder.decode(value, { stream: true });

                // SSE 协议：事件以 \n\n 分隔
                const events = sseBuffer.split('\n\n');
                // 最后一个可能是不完整的事件，保留在 buffer 中
                sseBuffer = events.pop() || '';

                let shouldBreak = false;
                for (const event of events) {
                    if (!event.trim()) continue;

                    // 一个 SSE 事件可能有多行 data:，拼接它们（用换行连接）
                    let data = '';
                    const eventLines = event.split('\n');
                    for (const eLine of eventLines) {
                        if (eLine.startsWith('data: ')) {
                            data += (data ? '\n' : '') + eLine.slice(6);
                        } else if (eLine.startsWith('data:')) {
                            data += (data ? '\n' : '') + eLine.slice(5);
                        }
                    }

                    if (!data) continue;
                    if (data === '[DONE]') { shouldBreak = true; break; }
                    if (data === '[FORMAT:XML]') { continue; }      // 信号保留兼容，渲染由 md-frame 自判
                    if (data === '[FORMAT:MARKDOWN]') { continue; } // 同上
                    if (data.startsWith('[ERROR]')) {
                        addMessage('system-msg', '\u26a0\ufe0f ' + data.slice(8));
                        shouldBreak = true; break;
                    }

                    aiMessage += data;
                    if (!messageEl) {
                        messageEl = addMessage('assistant-typing', aiMessage);
                    } else {
                        messageEl.innerHTML = stripXmlForPreview(aiMessage);
                    }
                    scrollToBottom();
                }
                if (shouldBreak) break;
            }

            // 流结束：删除打字机气泡，用 addMessage 重新渲染（走历史回填的稳定路径）
            stopTypingSound();
            if (messageEl && aiMessage) {
                const row = messageEl.closest('.message-row');
                if (row) row.remove();
                addMessage('assistant', aiMessage);
                playReceive(); // 回复完成提示音
                scrollToBottom();
            }
        } catch (e) {
            stopTypingSound();
            document.getElementById('typing').classList.remove('show');
            addMessage('system-msg', '\u26a0\ufe0f 出错了: ' + e.message);
        } finally {
            isStreaming = false;
            document.getElementById('send-btn').disabled = false;
            scrollToBottom();
        }
    }

    function sendQuick(text) {
        document.getElementById('chat-input').value = text;
        sendMessage();
    }

    function addMessage(role, content) {
        const container = document.getElementById('chat-messages');
        const isTyping = (role === 'assistant-typing');
        const displayRole = isTyping ? 'assistant' : role;

        // 创建消息行
        const row = document.createElement('div');
        row.className = `message-row ${displayRole}`;

        // 消息气泡
        const bubble = document.createElement('div');
        bubble.className = `message ${displayRole}`;

        if (role === 'assistant') {
            // 最终渲染：使用 iframe 隔离渲染 markdown
            const iframe = document.createElement('iframe');
            iframe.src = '/static/md-frame.html';
            iframe.style.cssText = 'width:100%;border:none;overflow:hidden;display:block;min-height:40px;';
            iframe.scrolling = 'no';
            iframe._pendingText = content;
            iframe._ready = false;

            // 监听 iframe 消息
            const onMsg = function(e) {
                if (!e.data || !e.data.type) return;
                if (e.source !== iframe.contentWindow) return;

                if (e.data.type === 'md-frame-ready') {
                    iframe._ready = true;
                    // 同步当前主题到 iframe
                    iframe.contentWindow.postMessage({ type: 'theme-change', theme: currentTheme }, '*');
                    // 内容格式由 md-frame 自主判断（<scene 开头走 XML，否则纯文本兜底），
                    // 不再依赖后端的 [FORMAT:*] 信号，读档回填场景也能正确渲染。
                    iframe.contentWindow.postMessage({ type: 'md-update', text: iframe._pendingText }, '*');
                } else if (e.data.type === 'md-frame-height') {
                    iframe.style.height = e.data.height + 'px';
                    scrollToBottom();
                } else if (e.data.type === 'md-choice') {
                    // 点击选项卡片 → 直接作为玩家回复发送
                    // 组装文本：「A. 端庄行礼…」，text 为空则只发 id
                    const cid = (e.data.id || '').trim();
                    const ctext = (e.data.text || '').trim();
                    const payload = ctext ? (cid ? cid + '. ' + ctext : ctext) : cid;
                    if (payload) sendQuick(payload); // sendQuick 内含 isStreaming 防重
                }
            };
            window.addEventListener('message', onMsg);
            iframe._msgHandler = onMsg;

            bubble.appendChild(iframe);
            bubble._iframe = iframe;
        } else if (isTyping) {
            // 打字机阶段：剥离 XML 标签，只显示文本内容（轻量预渲染）
            bubble.innerHTML = stripXmlForPreview(content);
            bubble.style.whiteSpace = 'pre-wrap';
        } else {
            bubble.textContent = content;
        }

        if (role === 'system-msg') {
            row.appendChild(bubble);
        } else if (displayRole === 'assistant') {
            // AI 消息左侧显示头像
            if (currentAvatarUrl) {
                const avatar = document.createElement('img');
                avatar.className = 'msg-avatar';
                avatar.src = currentAvatarUrl;
                row.appendChild(avatar);
            }
            row.appendChild(bubble);
        } else {
            // 用户消息右侧显示小圆圈
            const avatar = document.createElement('div');
            avatar.className = 'msg-avatar user-avatar';
            avatar.textContent = '👤';
            row.appendChild(bubble);
            row.appendChild(avatar);
        }

        container.appendChild(row);
        scrollToBottom();
        return bubble;
    }

    // ============================================================
    // 智能滚动：只在用户已在底部时自动滚动，否则显示「回到底部」按钮
    // ============================================================
    let userAtBottom = true;
    let hasNewMessage = false;

    function isNearBottom() {
        const container = document.getElementById('chat-messages');
        // 距离底部 80px 以内视为「在底部」
        return container.scrollHeight - container.scrollTop - container.clientHeight < 80;
    }

    function scrollToBottom() {
        if (userAtBottom) {
            const container = document.getElementById('chat-messages');
            container.scrollTop = container.scrollHeight;
        } else {
            // 用户在上方阅读，显示新消息提示
            hasNewMessage = true;
            updateScrollBtn();
        }
    }

    function scrollToBottomSmooth() {
        const container = document.getElementById('chat-messages');
        container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        hasNewMessage = false;
        updateScrollBtn();
    }

    function updateScrollBtn() {
        const btn = document.getElementById('scroll-bottom-btn');
        const dot = document.getElementById('new-msg-dot');
        if (userAtBottom) {
            btn.classList.remove('show');
            hasNewMessage = false;
        } else {
            btn.classList.add('show');
        }
        dot.style.display = hasNewMessage ? 'block' : 'none';
    }

    // 监听聊天区域滚动
    document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('chat-messages');
        container.addEventListener('scroll', () => {
            userAtBottom = isNearBottom();
            updateScrollBtn();
        });
    });

    // ============================================================
    // 自定义确认弹窗
    // ============================================================
    let confirmResolve = null;

    function showConfirm({ icon = '⚠️', title = '确认操作', desc = '确定要执行此操作吗？', okText = '确定' } = {}) {
        document.getElementById('confirm-icon').textContent = icon;
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-desc').textContent = desc;
        document.getElementById('confirm-ok-btn').textContent = okText;
        document.getElementById('confirm-modal').classList.add('show');
        return new Promise(resolve => { confirmResolve = resolve; });
    }

    function closeConfirm(result) {
        document.getElementById('confirm-modal').classList.remove('show');
        if (confirmResolve) { confirmResolve(result); confirmResolve = null; }
    }

    // 点击弹窗背景关闭
    document.getElementById('confirm-modal').addEventListener('click', (e) => {
        if (e.target.id === 'confirm-modal') closeConfirm(false);
    });

    async function resetChat() {
        if (isStreaming) return;
        const ok = await showConfirm({
            icon: '🔄',
            title: '重新开始',
            desc: '当前这局的对话记录会被清空哦~\n确定要重新开始吗？',
            okText: '重新开始',
        });
        if (!ok) return;

        // 调用后端清空当前存档槽的历史
        if (currentGameId) {
            try {
                await fetch('/api/reset?session_id=' + encodeURIComponent(sessionId) +
                    '&game_id=' + encodeURIComponent(currentGameId), {
                    method: 'POST',
                });
            } catch (e) { /* 清空失败也继续，至少前端干净 */ }
        }

        document.getElementById('chat-messages').innerHTML = 
            '<div class="message-row system-msg"><div class="message system-msg">已重新开始！点击「开始游戏」继续~</div></div>';
    }

    // ============================================================
    // 上传功能
    // ============================================================
    const dropzone = document.getElementById('upload-dropzone');
    const fileInput = document.getElementById('file-input');
    const uploadModal = document.getElementById('upload-modal');

    function openUpload() {
        uploadModal.classList.add('show');
        resetUploadUI();
    }

    function closeUpload() {
        uploadModal.classList.remove('show');
        loadGames(); // 关闭时刷新游戏列表
    }

    function resetUploadUI() {
        document.getElementById('upload-progress').classList.remove('show');
        document.getElementById('upload-status').className = 'upload-status';
        document.getElementById('upload-status').textContent = '准备上传...';
        document.getElementById('progress-fill').style.width = '0%';
    }

    // 点击选择文件
    dropzone.addEventListener('click', () => fileInput.click());

    // 拖拽效果
    dropzone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
    });
    dropzone.addEventListener('dragleave', () => {
        dropzone.classList.remove('dragover');
    });
    dropzone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
        const files = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.docx'));
        if (files.length > 0) uploadFiles(files);
        else alert('请选择 .docx 格式的文件哦~');
    });

    // 文件选择
    fileInput.addEventListener('change', () => {
        const files = Array.from(fileInput.files);
        if (files.length > 0) uploadFiles(files);
        fileInput.value = ''; // 重置，允许重复选择同一文件
    });

    // 批量上传
    async function uploadFiles(files) {
        const progressEl = document.getElementById('upload-progress');
        const statusEl = document.getElementById('upload-status');
        const fillEl = document.getElementById('progress-fill');

        progressEl.classList.add('show');
        let success = 0;
        let failed = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const percent = Math.round(((i) / files.length) * 100);
            fillEl.style.width = percent + '%';
            statusEl.textContent = `正在上传 (${i+1}/${files.length}): ${file.name}`;
            statusEl.className = 'upload-status';

            try {
                const formData = new FormData();
                formData.append('file', file);

                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || '上传失败');
                }

                success++;
            } catch (e) {
                failed++;
                console.error(`上传失败 ${file.name}:`, e);
            }
        }

        fillEl.style.width = '100%';

        if (failed === 0) {
            statusEl.textContent = `✅ 全部上传成功！添加了 ${success} 个新游戏`;
            statusEl.className = 'upload-status success';
        } else {
            statusEl.textContent = `完成：成功 ${success} 个，失败 ${failed} 个`;
            statusEl.className = 'upload-status error';
        }
    }

    // 点击弹窗背景关闭
    uploadModal.addEventListener('click', (e) => {
        if (e.target === uploadModal) closeUpload();
    });

    // ============================================================
    // 🔊 音效系统（Web Audio API 合成，无需外部文件）
    // ============================================================
    const SFX = {
        enabled: localStorage.getItem('sfx-enabled') !== 'false', // 默认开启
        bgmEnabled: localStorage.getItem('bgm-enabled') !== 'false',
        volume: parseFloat(localStorage.getItem('sfx-volume') || '0.5'),
        bgmVolume: parseFloat(localStorage.getItem('bgm-volume') || '0.3'),
        ctx: null,
        bgmGain: null,
        bgmSource: null,
        typingInterval: null,
    };

    function getAudioCtx() {
        if (!SFX.ctx) SFX.ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (SFX.ctx.state === 'suspended') SFX.ctx.resume();
        return SFX.ctx;
    }

    // --- 按钮点击音：轻柔的水滴声 ---
    function playClick() {
        if (!SFX.enabled) return;
        const ctx = getAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 2000;
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.06);
        gain.gain.setValueAtTime(SFX.volume * 0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
        osc.connect(filter).connect(gain).connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.08);
    }

    // --- 收到回复提示音：柔和的双音 "叮~咚" ---
    function playReceive() {
        if (!SFX.enabled) return;
        const ctx = getAudioCtx();
        const notes = [523, 659]; // C5, E5 柔和大三度
        notes.forEach((freq, i) => {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.value = 1500;
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(SFX.volume * 0.1, ctx.currentTime + i * 0.18);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.4);
            osc.connect(filter).connect(gain).connect(ctx.destination);
            osc.start(ctx.currentTime + i * 0.18);
            osc.stop(ctx.currentTime + i * 0.18 + 0.4);
        });
    }

    // --- 打字键盘音：极轻的软键盘触感 ---
    function playTypeTick() {
        if (!SFX.enabled) return;
        const ctx = getAudioCtx();
        const bufferSize = ctx.sampleRate * 0.012; // 12ms 极短
        const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 5);
        }
        const source = ctx.createBufferSource();
        source.buffer = buffer;
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 600 + Math.random() * 400;
        filter.Q.value = 2;
        gain.gain.value = SFX.volume * 0.04;
        source.connect(filter).connect(gain).connect(ctx.destination);
        source.start();
    }

    // 开始打字音循环（流式输出时调用）
    function startTypingSound() {
        if (SFX.typingInterval) return;
        SFX.typingInterval = setInterval(playTypeTick, 90 + Math.random() * 60);
    }
    function stopTypingSound() {
        if (SFX.typingInterval) { clearInterval(SFX.typingInterval); SFX.typingInterval = null; }
    }

    // --- 背景音乐：极柔和的环境氛围音 ---
    const BGM_THEMES = {
        lavender: { notes: [130.8, 164.8, 196, 261.6], tempo: 5.0 },   // C3-C4 低音区柔和
        gothic:   { notes: [110, 130.8, 155.6, 185],   tempo: 6.0 },   // A2 低沉阴暗
        cyber:    { notes: [165, 196, 220, 261.6],     tempo: 4.5 },   // 低频电子
        forest:   { notes: [146.8, 174.6, 196, 220],   tempo: 5.5 },   // D3 自然
    };

    let bgmTimeout = null;
    function startBGM() {
        if (!SFX.bgmEnabled) return;
        stopBGM();
        const ctx = getAudioCtx();
        const masterGain = ctx.createGain();
        masterGain.gain.value = SFX.bgmVolume * 0.06; // 极低音量
        const lpFilter = ctx.createBiquadFilter();
        lpFilter.type = 'lowpass';
        lpFilter.frequency.value = 800; // 截掉高频，只留温暖低音
        masterGain.connect(lpFilter).connect(ctx.destination);
        SFX.bgmGain = masterGain;

        function playNote() {
            if (!SFX.bgmEnabled) return;
            const theme = BGM_THEMES[currentTheme] || BGM_THEMES.lavender;
            const freq = theme.notes[Math.floor(Math.random() * theme.notes.length)];
            const osc = ctx.createOscillator();
            const noteGain = ctx.createGain();
            osc.type = 'triangle'; // triangle 比 sine 更柔和温暖
            osc.frequency.value = freq;
            // 缓慢淡入淡出，像呼吸一样
            noteGain.gain.setValueAtTime(0, ctx.currentTime);
            noteGain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 1.2);
            noteGain.gain.linearRampToValueAtTime(0, ctx.currentTime + theme.tempo);
            osc.connect(noteGain).connect(masterGain);
            osc.start(); osc.stop(ctx.currentTime + theme.tempo);
            // 音符间隔更大，留出呼吸空间
            bgmTimeout = setTimeout(playNote, (theme.tempo * 0.8 + Math.random() * 2.5) * 1000);
        }
        playNote();
    }
    function stopBGM() {
        if (bgmTimeout) { clearTimeout(bgmTimeout); bgmTimeout = null; }
        if (SFX.bgmGain) { SFX.bgmGain.gain.value = 0; SFX.bgmGain = null; }
    }

    function toggleSFX() {
        SFX.enabled = !SFX.enabled;
        localStorage.setItem('sfx-enabled', SFX.enabled);
        document.getElementById('sfx-toggle').checked = SFX.enabled;
        updateSoundBtnUI();
        if (SFX.enabled) playClick();
    }
    function toggleBGM() {
        SFX.bgmEnabled = !SFX.bgmEnabled;
        localStorage.setItem('bgm-enabled', SFX.bgmEnabled);
        document.getElementById('bgm-toggle').checked = SFX.bgmEnabled;
        if (SFX.bgmEnabled) startBGM(); else stopBGM();
        updateSoundBtnUI();
    }
    function setSfxVolume(val) {
        SFX.volume = parseFloat(val);
        SFX.bgmVolume = parseFloat(val);
        localStorage.setItem('sfx-volume', val);
        localStorage.setItem('bgm-volume', val);
        if (SFX.bgmGain) SFX.bgmGain.gain.value = SFX.bgmVolume * 0.15;
    }
    function toggleSoundPanel() {
        const panel = document.getElementById('sound-panel');
        panel.classList.toggle('show');
        playClick();
    }
    function updateSoundBtnUI() {
        const btn = document.getElementById('sound-toggle-btn');
        if (!btn) return;
        btn.textContent = SFX.enabled || SFX.bgmEnabled ? '🔊' : '🔇';
        btn.title = (SFX.enabled ? '音效开' : '音效关') + ' / ' + (SFX.bgmEnabled ? 'BGM开' : 'BGM关');
    }
    // 初始化音效面板 checkbox 状态
    setTimeout(() => {
        const sfxEl = document.getElementById('sfx-toggle');
        const bgmEl = document.getElementById('bgm-toggle');
        const volEl = document.getElementById('sfx-volume');
        if (sfxEl) sfxEl.checked = SFX.enabled;
        if (bgmEl) bgmEl.checked = SFX.bgmEnabled;
        if (volEl) volEl.value = SFX.volume;
        updateSoundBtnUI();
    }, 0);

    // 首次用户交互后启动 BGM（浏览器策略要求）
    document.addEventListener('click', function initAudioOnce() {
        if (SFX.bgmEnabled) startBGM();
        document.removeEventListener('click', initAudioOnce);
    }, { once: true });

    // ============================================================
    // 🎨 主题切换系统
    // ============================================================
    const THEMES = {
        lavender: { name: '梦幻薰衣草', floaties: ['💕','🌸','✨','💗','🦋','🌷','⭐','🩷','🐰','🌺'] },
        gothic:   { name: '哥特暗夜',   floaties: ['🦇','🌑','💀','🕷️','🥀','⚰️','🔮','🕯️','🖤','☠️'] },
        cyber:    { name: '赛博霓虹',   floaties: ['💎','⚡','🔷','💠','🌐','✦','◈','▲','◆','⬡'] },
        forest:   { name: '森林精灵',   floaties: ['🌿','🍃','🌱','🦋','🌻','🍀','🌾','🐝','🌳','🍂'] },
    };

    let currentTheme = localStorage.getItem('game-theme') || 'lavender';

    function setTheme(theme) {
        if (!THEMES[theme]) theme = 'lavender';
        currentTheme = theme;
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('game-theme', theme);

        // 更新面板选中态
        document.querySelectorAll('.theme-option').forEach(el => {
            el.classList.toggle('active', el.dataset.theme === theme);
        });

        // 重新生成飘落物
        spawnFloaties();

        // 同步主题到所有已存在的 iframe
        document.querySelectorAll('.message.assistant iframe').forEach(iframe => {
            if (iframe.contentWindow) {
                iframe.contentWindow.postMessage({ type: 'theme-change', theme: theme }, '*');
            }
        });
    }

    function toggleThemePanel() {
        const panel = document.getElementById('theme-panel');
        panel.classList.toggle('show');
        // 用户点击后取消提示
        dismissThemeHint();
    }

    function dismissThemeHint() {
        const btn = document.getElementById('theme-toggle-btn');
        const tip = document.getElementById('theme-hint-tooltip');
        btn.classList.remove('hint-pulse');
        tip.classList.remove('show');
        localStorage.setItem('theme-hint-seen', '1');
    }

    // 首次访问时显示脉冲 + 提示气泡
    (function initThemeHint() {
        if (localStorage.getItem('theme-hint-seen')) return;
        const btn = document.getElementById('theme-toggle-btn');
        const tip = document.getElementById('theme-hint-tooltip');
        // 延迟 1.5s 后出现，避免页面加载时太突兀
        setTimeout(() => {
            btn.classList.add('hint-pulse');
            tip.classList.add('show');
        }, 1500);
        // 8 秒后自动消失
        setTimeout(() => {
            tip.classList.remove('show');
        }, 9500);
    })();

    // 点击面板外关闭
    document.addEventListener('click', (e) => {
        const themePanel = document.getElementById('theme-panel');
        const themeBtn = document.getElementById('theme-toggle-btn');
        if (!themePanel.contains(e.target) && e.target !== themeBtn) {
            themePanel.classList.remove('show');
        }
        const soundPanel = document.getElementById('sound-panel');
        const soundBtn = document.getElementById('sound-toggle-btn');
        if (!soundPanel.contains(e.target) && e.target !== soundBtn) {
            soundPanel.classList.remove('show');
        }
    });

    // ============================================================
    // 🎈 背景飘落的小爱心 / 花瓣 / 星星
    // ============================================================
    function spawnFloaties() {
        const layer = document.getElementById('floaties');
        if (!layer) return;
        layer.innerHTML = ''; // 清空旧的
        const emojis = THEMES[currentTheme]?.floaties || THEMES.lavender.floaties;
        const COUNT = 14;
        for (let i = 0; i < COUNT; i++) {
            const el = document.createElement('span');
            el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.fontSize = (14 + Math.random() * 18) + 'px';
            const dur = 9 + Math.random() * 10;          // 9~19s 飘落
            el.style.animationDuration = dur + 's';
            el.style.animationDelay = (-Math.random() * dur) + 's'; // 错峰，避免一起出现
            layer.appendChild(el);
        }
    }

    // ============================================================
    // 初始化
    // ============================================================
    // 应用保存的主题（页面加载时立即生效）
    document.documentElement.setAttribute('data-theme', currentTheme);
    document.querySelectorAll('.theme-option').forEach(el => {
        el.classList.toggle('active', el.dataset.theme === currentTheme);
    });
    spawnFloaties();
    loadGames(); // 会同时加载游戏列表和存档索引

    // 刷新恢复：如果之前在某个存档里，自动恢复进去
    (function restoreActiveGame() {
        try {
            const saved = sessionStorage.getItem('active-game');
            if (!saved) return;
            const { gameId, gameName, avatarUrl, sessionId: sid } = JSON.parse(saved);
            if (!gameId || !sid) return;
            // 立即切换页面（不闪烁），然后恢复游戏状态
            document.getElementById('games-page').classList.remove('active');
            document.getElementById('chat-page').classList.add('active');
            enterGame(gameId, gameName, avatarUrl, 'continue', sid);
        } catch (e) { /* 忽略解析错误 */ }
    })();
</script>
